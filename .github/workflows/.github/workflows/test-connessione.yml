name: Test Connettivita Porta 22

# Trigger super semplice: parte da solo appena salvi (fai il push)
on: [push]

jobs:
  check-port:
    runs-on: ubuntu-latest

    steps:
    - name: Tentativo di connessione alla porta 22
      run: |
        echo "Tentativo di connessione a utocav423.admin.servizi.rai.it sulla porta 22..."
        if nc -z -w 10 utocav423.admin.servizi.rai.it 22; then
          echo "✅ SUCCESSO: La porta 22 è APERTA!"
        else
          echo "❌ ERRORE: La porta 22 è CHIUSA o bloccata."
          exit 1
        fi
