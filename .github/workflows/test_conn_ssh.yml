name: test_conn_ssh

on:
  workflow_dispatch: 

jobs:
  test-ssh-connection:
    runs-on: ubuntu-latest # runner fornito da GitHub

    steps:
    - name: Connessione ed esecuzione comando di test via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        timeout: 15s 
        script: |
          echo "=== CONNESSIONE RIUSCITA CON SUCCESSO ==="
          echo "Server Remoto: $(hostname)"
          echo "Data Server: $(date)"
