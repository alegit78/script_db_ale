name: Test Connessione SSH Oracle

on:
  workflow_dispatch: # Ti permette di avviarlo manualmente con un click da GitHub Actions UI

jobs:
  test-ssh-connection:
    runs-on: ubuntu-latest # Il runner temporaneo fornito da GitHub

    steps:
    - name: Connessione ed esecuzione comando di test via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        timeout: 15s # Se il firewall blocca, si ferma dopo 15 secondi senza rimanere appeso a vuoto
        script: |
          echo "=== CONNESSIONE RIUSCITA CON SUCCESSO ==="
          echo "Server Remoto: $(hostname)"
          echo "Data Server: $(date)"
